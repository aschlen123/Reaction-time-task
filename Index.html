<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time Experiment</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* Screen 1: Welcome */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        input { padding: 10px; margin: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }

        /* Screen 2: Task */
        #task-screen { display: none; background: #fff; cursor: crosshair; }
        #canvas { display: block; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="container">
            <h1>Reaction Time Task</h1>
            <p>Enter your ID to begin (or leave blank for random):</p>
            <input type="text" id="participant-id" placeholder="Participant ID">
            <br>
            <button id="start-btn">Start Task</button>
        </div>
    </div>

    <div id="task-screen">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        // --- CONFIGURATION ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx-HFDe2mEKywBLbmS9r_1flKprd9JYgpoYKeXpNhfgQbwiFMTDzOdiDvrDgjTshqo7fg/exec"; 
        const TOTAL_TRIALS = 10;
        const CIRCLE_RADIUS = 50;
        const DELAY_BETWEEN_TRIALS = 500;

        // --- STATE VARIABLES ---
        let participantId = "";
        let trialsCompleted = 0;
        let startTime = 0;
        let circleX = 0;
        let circleY = 0;

        const welcomeScreen = document.getElementById('welcome-screen');
        const taskScreen = document.getElementById('task-screen');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // --- SCREEN 1 LOGIC ---
        document.getElementById('start-btn').addEventListener('click', () => {
            const inputId = document.getElementById('participant-id').value.trim();
            
            // Assign ID: Input value or random alphanumeric
            participantId = inputId || Math.random().toString(36).substring(2, 9).toUpperCase();
            
            startExperiment();
        });

        // --- SCREEN 2 LOGIC ---
        function startExperiment() {
            welcomeScreen.style.display = 'none';
            taskScreen.style.display = 'block';
            resizeCanvas();
            spawnCircle();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function spawnCircle() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Calculate random position within screen bounds (subtracting radius to keep it on screen)
            circleX = Math.random() * (canvas.width - CIRCLE_RADIUS * 2) + CIRCLE_RADIUS;
            circleY = Math.random() * (canvas.height - CIRCLE_RADIUS * 2) + CIRCLE_RADIUS;

            ctx.beginPath();
            ctx.arc(circleX, circleY, CIRCLE_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = "#ff4757";
            ctx.fill();
            ctx.closePath();

            startTime = performance.now();
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Check if click is inside the circle
            const distance = Math.sqrt((mouseX - circleX) ** 2 + (mouseY - circleY) ** 2);
            
            if (distance < CIRCLE_RADIUS) {
                const reactionTime = Math.round(performance.now() - startTime);
                trialsCompleted++;
                
                // Log progress
                console.log(`Trial ${trialsCompleted}: ${reactionTime}ms`);
                
                // Record data to Sheets
                sendToSheets(trialsCompleted, reactionTime);

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (trialsCompleted < TOTAL_TRIALS) {
                    setTimeout(spawnCircle, DELAY_BETWEEN_TRIALS);
                } else {
                    finishExperiment();
                }
            }
        });

        // --- DATA SUBMISSION ---
        async function sendToSheets(trialNum, rt) {
            const payload = {
                Participant_ID: participantId,
                Trial_Number: trialNum,
                Reaction_Time: rt
            };

            try {
                // Using 'no-cors' mode as Apps Script returns a redirect that can trigger CORS issues
                // even if the data was successfully saved. 
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (error) {
                console.error("Error sending data:", error);
            }
        }

        function finishExperiment() {
            taskScreen.style.display = 'none';
            welcomeScreen.style.display = 'flex';
            welcomeScreen.innerHTML = `
                <div class="container">
                    <h1>Task Complete!</h1>
                    <p>Thank you, ${participantId}. Your data has been submitted.</p>
                </div>`;
        }

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
